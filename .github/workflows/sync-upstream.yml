name: Sync with Upstream

on:
  schedule:
    - cron: '0 6 * * *' # Daily at 6 AM UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/einride/protoc-gen-go-aip-test.git || true
          git fetch upstream
      
      - name: Update master branch
        run: |
          git checkout master
          git pull upstream master
          git push origin master
      
      - name: Rebase connectrpc branch
        id: rebase
        run: |
          git checkout connectrpc
          git rebase master
          echo "rebase_success=true" >> $GITHUB_OUTPUT
        continue-on-error: true
      
      - name: Setup Sage
        if: steps.rebase.outputs.rebase_success == 'true'
        uses: einride/sage/actions/setup@master
        with:
          go-version: "1.23"
      
      - name: Run CI checks
        if: steps.rebase.outputs.rebase_success == 'true'
        id: ci_checks
        run: |
          make
          echo "ci_success=true" >> $GITHUB_OUTPUT
        continue-on-error: true
      
      - name: Push rebased connectrpc branch
        if: steps.rebase.outputs.rebase_success == 'true' && steps.ci_checks.outputs.ci_success == 'true'
        run: |
          git push origin connectrpc --force-with-lease
      
      - name: Create issue on rebase conflict
        if: steps.rebase.outputs.rebase_success != 'true' || steps.ci_checks.outputs.ci_success != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'upstream-sync-conflict',
              state: 'open'
            });
            
            if (issues.length === 0) {
              const rebaseSuccess = '${{ steps.rebase.outputs.rebase_success }}' === 'true';
              const ciSuccess = '${{ steps.ci_checks.outputs.ci_success }}' === 'true';
              
              let title, body;
              if (!rebaseSuccess) {
                title = 'Manual intervention required: upstream sync conflict';
                body = `The automated rebase of \`connectrpc\` branch onto \`master\` failed due to merge conflicts.
                
                **Manual steps required:**
                1. \`git checkout connectrpc\`
                2. \`git rebase master\`
                3. Resolve conflicts manually
                4. \`make\` (verify CI passes)
                5. \`git push origin connectrpc --force-with-lease\`
                
                This issue will auto-close on the next successful sync.`;
              } else {
                title = 'Manual intervention required: CI checks failed after rebase';
                body = `The automated rebase of \`connectrpc\` branch onto \`master\` succeeded, but CI checks failed.
                
                **Manual steps required:**
                1. \`git checkout connectrpc\`
                2. Fix any issues causing CI failures
                3. \`make\` (verify CI passes)
                4. \`git push origin connectrpc --force-with-lease\`
                
                This issue will auto-close on the next successful sync.`;
              }
              
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['upstream-sync-conflict', 'needs-attention']
              });
            }
      
      - name: Close existing conflict issues on success
        if: steps.rebase.outputs.rebase_success == 'true' && steps.ci_checks.outputs.ci_success == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'upstream-sync-conflict',
              state: 'open'
            });
            
            for (const issue of issues) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed'
              });
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: 'Upstream sync completed successfully. Conflicts have been resolved.'
              });
            }
